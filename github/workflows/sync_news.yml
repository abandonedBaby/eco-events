name: Scheduled Weekly News Sync

on:
  schedule:
    # Runs at 23:00 UTC every Sunday (6:00 PM EST)
    - cron: '0 12 * * 0'
  workflow_dispatch: # Allows you to manually trigger it anytime via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo content
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas

      - name: Execute News Sync Script
        run: python update_news.py

      - name: Commit and Push Changes back to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add news_archive.csv
          git diff-index --quiet HEAD || git commit -m "Automated update of weekly economic events matrix"
          git push
