name: Scheduled Weekly News Sync

on:
  schedule:
    # Runs at 12:17 UTC every Sunday (7:17 AM CST / 8:17 AM EST)
    - cron: '17 12 * * 0'
  workflow_dispatch: # Allows you to manually trigger it anytime via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Grant explicit write permissions to commit changes back to the repository
    permissions:
      contents: write
      
    steps:
      - name: Check out repo content
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Execute News Sync Script
        run: python update_news.py

      - name: Commit and Push Changes back to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add news_archive.csv
          git diff-index --quiet HEAD || git commit -m "Automated update of weekly economic events matrix"
          git push
